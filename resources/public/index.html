<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gremllm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --pico-font-size: 14px;

            /* TVA/Brutalist Palette Tokens */
            --tva-parchment: #E8DCC4;
            --tva-cocoa: #2B1B17;
            --tva-orange: #F47920;
            --tva-amber: #D45B12;
            --tva-concrete: #8C8C8C;
            --tva-teal: #004B49;

            /* Session color palette */
            --session-color-1: #E07634;
            --session-color-2: #3D8B8A;
            --session-color-3: #7B5EA7;
            --session-color-4: #C4534A;
            --session-color-5: #4A7B3F;
        }

        /* Light Scope — Document Panel, Welcome Screen */
        :root[data-theme=light] {
            /* Surface */
            --pico-background-color: var(--tva-parchment);
            --pico-color: var(--tva-cocoa);

            /* Primary accent */
            --pico-primary: var(--tva-orange);
            --pico-primary-hover: var(--tva-amber);

            /* Muted tones (warm cocoa-alpha) */
            --pico-muted-color: rgba(43, 27, 23, 0.55);
            --pico-muted-border-color: rgba(43, 27, 23, 0.15);

            /* Cards and forms */
            --pico-card-background-color: rgba(232, 220, 196, 0.4);
            --pico-card-border-color: rgba(43, 27, 23, 0.1);
            --pico-form-element-background-color: rgba(232, 220, 196, 0.5);
            --pico-form-element-border-color: rgba(43, 27, 23, 0.2);

            /* Headings */
            --pico-h1-color: var(--tva-cocoa);
            --pico-h2-color: var(--tva-cocoa);
            --pico-h3-color: var(--tva-cocoa);
            --pico-h4-color: var(--tva-cocoa);
            --pico-h5-color: var(--tva-cocoa);
            --pico-h6-color: var(--tva-cocoa);
        }

        /* Dark Scope — Nav Strip, Nav Overlay, Chat Panel */
        [data-theme=dark] {
            /* Surface */
            --pico-background-color: var(--tva-cocoa);
            --pico-color: var(--tva-parchment);

            /* Primary accent */
            --pico-primary: var(--tva-orange);
            --pico-primary-hover: var(--tva-amber);

            /* Muted tones (parchment-alpha) */
            --pico-muted-color: rgba(232, 220, 196, 0.55);
            --pico-muted-border-color: rgba(232, 220, 196, 0.15);

            /* Cards and forms */
            --pico-card-background-color: rgba(232, 220, 196, 0.08);
            --pico-card-border-color: rgba(232, 220, 196, 0.15);
            --pico-form-element-background-color: rgba(232, 220, 196, 0.08);
            --pico-form-element-border-color: rgba(232, 220, 196, 0.2);

            /* Headings */
            --pico-h1-color: var(--tva-parchment);
            --pico-h2-color: var(--tva-parchment);
            --pico-h3-color: var(--tva-parchment);
            --pico-h4-color: var(--tva-parchment);
            --pico-h5-color: var(--tva-parchment);
            --pico-h6-color: var(--tva-parchment);
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0 auto;
        }

        .app-layout {
            display: flex;
            flex-direction: row;
            height: 100vh;
        }

        .reasoning-summary {
            cursor: pointer;
            color: var(--pico-muted-color);
        }

        /* Structural background rule — dark-scoped elements need explicit backgrounds */
        .chat-panel[data-theme=dark] {
            background-color: var(--pico-background-color);
            color: var(--pico-color);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: var(--pico-spacing);
        }

        .user-bubble {
            background: color-mix(in srgb, var(--tva-parchment) 15%, transparent);
            border-left: 3px solid color-mix(in srgb, var(--tva-parchment) 30%, transparent);
            margin-left: auto;
            max-width: 70%;
        }

        .assistant-bubble {
            background: var(--pico-card-background-color);
            border-left: 3px solid var(--active-session-color);
        }

        .reasoning-bubble {
            background: color-mix(in srgb, var(--tva-parchment) 5%, transparent);
            opacity: 0.85;
            border-left: 3px solid var(--pico-muted-border-color);
        }

        .tool-detail-bubble {
            background: color-mix(in srgb, var(--tva-parchment) 5%, transparent);
            border-left: 3px solid var(--active-session-color);
            opacity: 0.85;
            padding: 0.5rem 0.75rem;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }

        .tool-detail-summary {
            cursor: pointer;
            color: var(--pico-muted-color);
        }

        .tool-detail-body {
            margin-top: 0.25rem;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .tool-status-indicator {
            color: var(--pico-muted-color);
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            border-left: 2px solid var(--pico-muted-border-color);
            margin: 0.25rem 0;
        }

        textarea.chat-input {
            field-sizing: content;
            max-height: calc(1.5em * 16);
            overflow-y: auto;
            resize: none;
        }

        .excerpt-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .excerpt-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            background: var(--pico-muted-border-color);
            border-radius: 1rem;
            color: var(--pico-muted-color);
        }

        .excerpt-chip .dismiss {
            all: unset;
            cursor: pointer;
            padding: 0 0.125rem;
            font-size: 0.625rem;
            line-height: 1;
        }

        .document-panel {
            flex: 3;
            min-width: 50%;
            position: relative;
            overflow-y: auto;
            padding: var(--pico-spacing);
            transition: flex 0.3s ease;
            display: flex;
            flex-direction: row;
        }

        .document-panel > article {
            flex: 1;
            min-width: 0;
        }

        .session-gutter {
            flex: 0 0 24px;
            position: relative;
            border-left: 1px solid var(--pico-muted-border-color);
        }

        .session-gutter[role="toolbar"] {
            display: flex;
            flex-direction: column;
        }

        .session-bar-target {
            position: absolute;
            right: 0;
            width: 100%;
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            display: flex;
            justify-content: center;
        }

        .session-bar-target:hover {
            background: color-mix(in srgb, var(--bar-color) 8%, transparent);
        }

        .session-bar {
            width: 5px;
            border-radius: 3px;
            height: 100%;
            position: absolute;
            right: 6px;
            top: 0;
        }

        .session-bar--active {
            opacity: 1;
            box-shadow: 0 0 4px color-mix(in srgb, var(--bar-color) 50%, transparent);
        }

        .session-bar--inactive {
            opacity: 0.35;
        }

        .session-bar-target:hover .session-bar--inactive {
            opacity: 0.70;
        }

        ::highlight(anchor) {
            background-color: color-mix(in srgb, var(--active-session-color) 12%, transparent);
        }

        ::highlight(anchor-preview) {
            background-color: color-mix(in srgb, var(--preview-session-color) 8%, transparent);
        }

        .selection-popover {
            display: flex;
            gap: 4px;
        }

        .chat-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid var(--pico-muted-border-color);
            transition: flex 0.3s ease;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Diff mode — monospace document view when pending diffs are present */
        .diff-mode {
            font-family: var(--pico-font-family-monospace, monospace);
            white-space: pre-wrap;
            font-size: 0.8125rem;
            line-height: 1.6;
            padding: var(--pico-spacing);
        }

        .diff-block {
            border-left: 3px solid var(--pico-primary);
            padding: 0.25rem 0.5rem;
            margin: 0.5rem 0;
            background: var(--pico-card-background-color);
            border-radius: var(--pico-border-radius);
        }

        .diff-block del {
            display: block;
            background: color-mix(in srgb, var(--tva-orange) 12%, transparent);
            text-decoration: line-through;
            padding: 0.125rem 0.25rem;
            border-radius: 2px;
        }

        .diff-block ins {
            display: block;
            background: color-mix(in srgb, var(--tva-teal) 12%, transparent);
            text-decoration: none;
            padding: 0.125rem 0.25rem;
            border-radius: 2px;
        }

        ::highlight(excerpt) {
            background-color: color-mix(in srgb, var(--tva-amber) 18%, transparent);
            border-radius: 2px;
        }

        .diff-controls {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .diff-controls button {
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script src="compiled-js/renderer.js"></script>
</body>

</html>
